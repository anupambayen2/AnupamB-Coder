# configs/medium.yaml
# 125M parameter model — optimized for 500GB Python + SQL training
# Fits in 8GB VRAM using fp16 + 8-bit Adam + gradient checkpointing

model:
  vocab_size: 32000
  block_size: 1024 # increased from 512 — sees full functions
  n_layer: 12 # was 6
  n_head: 16 # was 8
  n_embd: 1024 # was 512
  dropout: 0.1
  bias: true

training:
  batch_size: 2 # smaller batch — larger model
  grad_accum_steps: 16 # effective batch = 32
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  max_steps: 100000
  warmup_steps: 2000
  eval_interval: 500
  save_interval: 1000
  grad_clip: 1.0
  weight_decay: 0.1
  fp16: true
  use_8bit_adam: true # saves ~1.2 GB VRAM
  gradient_checkpointing: true # saves ~1.0 GB VRAM

stage: 1
checkpoint_dir: "checkpoints/run_001"
log_path: "logs/stage1_log.jsonl"
resume_from: null
